<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#302b63"/>
    </linearGradient>
    <linearGradient id="chartGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="white" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Chart area fill -->
  <polygon points="10,46 20,38 30,40 40,28 54,16 54,46" fill="url(#fill)"/>

  <!-- Chart line -->
  <polyline points="10,46 20,38 30,40 40,28 54,16"
            stroke="url(#chartGlow)"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            fill="none"
            filter="url(#glow)"/>

  <!-- Dot at peak -->
  <circle cx="54" cy="16" r="3" fill="#fbbf24" filter="url(#glow)"/>

  <!-- Baseline -->
  <line x1="10" y1="50" x2="54" y2="50" stroke="white" stroke-opacity="0.12" stroke-width="1"/>

</svg>
