<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="chartFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="cardClip">
      <rect x="700" y="80" width="420" height="470" rx="24"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Accent blob top left -->
  <ellipse cx="100" cy="100" rx="200" ry="150" fill="#6366f1" fill-opacity="0.12"/>
  <!-- Accent blob bottom right -->
  <ellipse cx="1100" cy="580" rx="180" ry="130" fill="#8b5cf6" fill-opacity="0.1"/>

  <!-- LEFT SIDE — Brand -->

  <!-- Logo icon -->
  <rect x="80" y="160" width="56" height="56" rx="14" fill="url(#accent)"/>
  <polyline points="94,200 107,182 120,188 133,170" stroke="#fbbf24" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polygon points="133,170 128,174 130,180" fill="#fbbf24"/>

  <!-- FreedomCalc wordmark -->
  <text x="80" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="800" fill="white" letter-spacing="-2">Freedom</text>
  <text x="80" y="348" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="800" letter-spacing="-2">
    <tspan fill="white">Calc</tspan>
  </text>

  <!-- Accent underline -->
  <rect x="80" y="362" width="220" height="5" rx="3" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="80" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="white" fill-opacity="0.6">Financial Independence Calculators</text>
  <text x="80" y="452" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="white" fill-opacity="0.6">for the FIRE movement</text>

  <!-- Badges -->
  <rect x="80" y="490" width="110" height="36" rx="18" fill="white" fill-opacity="0.08"/>
  <text x="135" y="514" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="white" fill-opacity="0.8" text-anchor="middle">Free</text>

  <rect x="202" y="490" width="140" height="36" rx="18" fill="white" fill-opacity="0.08"/>
  <text x="272" y="514" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="white" fill-opacity="0.8" text-anchor="middle">No Signup</text>

  <rect x="354" y="490" width="160" height="36" rx="18" fill="white" fill-opacity="0.08"/>
  <text x="434" y="514" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="white" fill-opacity="0.8" text-anchor="middle">Browser-only</text>

  <!-- RIGHT SIDE — Calculator Card -->
  <rect x="700" y="80" width="420" height="470" rx="24" fill="url(#cardBg)" stroke="white" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Card header -->
  <rect x="700" y="80" width="420" height="70" rx="24" fill="white" fill-opacity="0.06"/>
  <rect x="700" y="126" width="420" height="24" fill="white" fill-opacity="0.06"/>
  <text x="724" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="white" fill-opacity="0.9">FIRE Calculator</text>
  <circle cx="1080" cy="115" r="6" fill="#22c55e"/>
  <circle cx="1060" cy="115" r="6" fill="#fbbf24"/>
  <circle cx="1040" cy="115" r="6" fill="#ef4444" fill-opacity="0.7"/>

  <!-- Input rows -->
  <text x="724" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white" fill-opacity="0.45" font-weight="500">CURRENT PORTFOLIO</text>
  <rect x="724" y="188" width="360" height="34" rx="8" fill="white" fill-opacity="0.07"/>
  <text x="740" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="white" fill-opacity="0.9">$125,000</text>

  <text x="724" y="244" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white" fill-opacity="0.45" font-weight="500">ANNUAL EXPENSES</text>
  <rect x="724" y="252" width="360" height="34" rx="8" fill="white" fill-opacity="0.07"/>
  <text x="740" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="white" fill-opacity="0.9">$40,000</text>

  <!-- Result row -->
  <rect x="724" y="302" width="360" height="60" rx="12" fill="url(#accent)" fill-opacity="0.25"/>
  <text x="740" y="326" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white" fill-opacity="0.7" font-weight="500">FIRE NUMBER</text>
  <text x="740" y="352" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="white">$1,000,000</text>

  <!-- Mini chart -->
  <text x="724" y="388" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white" fill-opacity="0.35" font-weight="500">PORTFOLIO PROJECTION</text>

  <!-- Chart area fill -->
  <polygon points="724,450 774,442 824,430 874,412 924,388 974,355 1024,312 1074,450" fill="url(#chartFill)"/>
  <!-- Chart line -->
  <polyline points="724,450 774,442 824,430 874,412 924,388 974,355 1024,312 1074,265" stroke="url(#chartLine)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  <!-- Chart dot at end -->
  <circle cx="1074" cy="265" r="5" fill="#fbbf24"/>

  <!-- X axis -->
  <line x1="724" y1="450" x2="1084" y2="450" stroke="white" stroke-opacity="0.1" stroke-width="1"/>

  <!-- URL tag bottom left -->
  <text x="80" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="white" fill-opacity="0.35">freedomcalc.dev</text>
</svg>
